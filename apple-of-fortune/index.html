<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple of Fortune</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <!-- Background elements -->
        <div class="background">
            <div class="bg-blur"></div>
        </div>

        <!-- Top Header -->
        <div class="header">
            <div class="icon-btn info-icon">i</div>
            <div class="balance-container">
                <span class="currency">ج.م</span>
                <span class="balance" id="balanceDisplay">40.26</span>
                <button class="add-btn">+</button>
            </div>
            <div class="icon-btn close-icon">X</div>
        </div>
        <div class="title">APPLE OF FORTUNE</div>

        <!-- Game Area -->
        <div class="game-area">
            <!-- Left Sidebar (Multipliers) -->
            <div class="multipliers">
                <div class="mult-row" data-row="9">x349.68</div>
                <div class="mult-row" data-row="8">x69.93</div>
                <div class="mult-row" data-row="7">x27.97</div>
                <div class="mult-row" data-row="6">x11.18</div>
                <div class="mult-row" data-row="5">x6.71</div>
                <div class="mult-row" data-row="4">x4.02</div>
                <div class="mult-row" data-row="3">x2.41</div>
                <div class="mult-row" data-row="2">x1.93</div>
                <div class="mult-row" data-row="1">x1.54</div>
                <div class="mult-row" data-row="0">x1.23</div>
            </div>

            <!-- Grid -->
            <div class="grid" id="grid">
                <!-- Grid items generated by JS -->
            </div>
        </div>

        <!-- Win Notification -->
        <div class="win-popup hidden" id="winPopup">
            <div class="win-title">الفوز!</div>
            <div class="win-amount">أرباحك: <span id="winAmountDisplay">0.00</span> ج.م</div>
        </div>

        <!-- Bottom Betting Area -->
        <div class="bottom-bar">
            <!-- Before playing -->
            <div class="bet-controls" id="betControls">
                <button class="bet-btn">MAX</button>
                <button class="bet-btn">X/2</button>
                <button class="bet-btn">X2</button>
                <button class="bet-btn">MIN</button>
            </div>
            <div class="bet-input-row" id="betInputRow">
                <button class="play-btn" id="playBtn">العب</button>
                <div class="bet-input-wrapper">
                    <span class="currency-input">ج.م</span>
                    <input type="number" id="betInput" value="40.26">
                </div>
            </div>

            <!-- During play (Cashout) -->
            <div class="cashout-controls hidden" id="cashoutControls">
                <div class="current-win-text">الأرباح الحالية: <span id="currentWinDisplay">0</span> ج.م</div>
                <button class="cashout-btn" id="cashoutBtn">خذ الأرباح</button>
            </div>
            
            <div class="footer-links">
                <div class="link-item"><span class="icon">⚙️</span> إعدادات</div>
                <div class="link-item">الرهان بنقرة واحدة</div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
